repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: pytest
        name: pytest (smoke tier)
        entry: python -m pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
        # Set the dummy env vars the test suite expects so config.py doesn't
        # fail-fast on a developer machine without ANTHROPIC_API_KEY exported.
        verbose: true
