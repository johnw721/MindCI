name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Pipeline modules import config which fail-fasts without an API key.
      # Tests stub the network; this just satisfies the env validator.
      MINDCI_SKIP_ENV_CHECK: "1"
      ANTHROPIC_API_KEY: "ci-dummy-not-used"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

      - name: Compile-check entry points
        run: python -m py_compile app_dashboard.py app.py mindci.py run_pipeline.py

      - name: Smoke-import all pipeline modules
        run: |
          python -c "from pipeline import convert, generate, interview, jd_analyzer, scenarios, suggestions, weekly, quality, _client; print('all pipeline modules import cleanly')"
